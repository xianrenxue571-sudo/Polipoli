<body>
    <h1 class="sr-only">Polipoli 啪哩啪哩 - 台灣政治人物言行審查與社會議題追蹤站</h1>

    <header id="main-header">
        <div class="logo-container" onclick="resetToLatest(true)">
            <img src="/polipoli_favicon.png" alt="Polipoli Logo" class="header-logo-img">
            <div class="header-text-group">
                <div class="header-title">Polipoli 啪哩啪哩追蹤站</div>
                <div class="header-slogan">把政治人物的虛偽外衣，扒得清清楚楚。</div>
                <div class="header-subtitle">專門收錄裝作啪哩啪哩，做事卻兩光的政治人物。</div>
            </div>
        </div>
        <a href="/about.html" class="header-about-link">ℹ️ 關於本站</a>
    </header>

    <nav class="main-tabs" aria-label="主要導覽">
        <button class="main-tab-btn active" id="tab-politicians" onclick="switchMainTab('politicians')">人物言行</button>
        <button class="main-tab-btn" id="tab-issues" onclick="switchMainTab('issues')">社會議題</button>

        <aside>

            <div class="search-container" id="sidebar-search-container">

               <div id="quick-tags-container" class="quick-tags-container">
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; width: 100%;">資料載入中...</div>
                </div>
            </div>
        </aside>

        <main>
            <div class="feed-header">
                <h2 id="feed-title">綜合最新事件牆</h2>
            </div>
         
            <div id="stat-dashboard"></div>

            <div id="events-feed"></div>

            <div id="analysis-feed" style="display:none;"></div>
            
            <div id="loader">載入更多事件中...</div>
            <div id="end-message" class="end-message">已經到底囉！</div>
