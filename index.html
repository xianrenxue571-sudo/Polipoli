<body>

    <!-- 【SEO 優化】如果爬蟲不吃 JS，至少看得到這些靜態內容 -->
    <noscript>
        <h1>Polipoli 啪哩啪哩追蹤站</h1>
        <p>這是一個專注記錄台灣政治人物言行與社會議題的網站。請啟用 JavaScript 以獲得完整體驗。</p>
    </noscript>

    <header id="main-header">
        <!-- 【SEO 優化】豐富 H1 內容，讓爬蟲抓取，但視覺上保持簡潔 -->
        <h1 onclick="resetToLatest()">
            <span class="seo-text">Polipoli 政治人物言行與社會議題追蹤</span>
            言行審查 • 雙標對決站
        </h1>
    </header>

    <div class="main-tabs">
        <button id="tab-politicians" class="main-tab-btn active" onclick="switchMainTab('politicians')">人物檔案</button>
        <button id="tab-issues" class="main-tab-btn" onclick="switchMainTab('issues')">社會議題</button>
    </div>

    <div class="container">
        <aside>
            <h2 id="sidebar-title">人物檔案庫</h2>
            <div id="sidebar-search-container" class="search-container">
                <input type="text" id="sidebar-search" class="search-input" placeholder="搜尋政治人物..." onkeyup="filterSidebar()">
            </div>
            <select id="mobile-issue-select" class="mobile-issue-select" onchange="handleMobileIssueSelect(this.value)"></select>
            <div id="quick-tags-container" class="quick-tags-container"></div>
        </aside>

        <main>
            <div class="feed-header">
                <h2 id="feed-title">綜合最新事件牆</h2>
            </div>
            <div id="events-feed"></div>
            <div id="loader">資料載入中...</div>
            <div id="end-message" class="end-message">沒有更多資料了</div>
        </main>
    </div>

    <div id="image-modal" onclick="closeImageModal()">
        <img id="modal-img" src="" alt="放大圖片">
    </div>

    <script>
        // ==========================================
        // 1. 初始化設定與全域變數
        // ==========================================
        // 請務必替換成你的真實金鑰
        const SUPABASE_URL = '你的_SUPABASE_URL'; 
        const ANON_KEY = '你的_ANON_KEY';
        
        // 【錯誤修復】確保 Supabase 庫已載入才執行
        if (typeof window.supabase === 'undefined') {
            console.error("致命錯誤: 找不到 Supabase 庫。請確認 <script> 標籤有正確載入。");
        }
        const supabase = window.supabase.createClient(SUPABASE_URL, ANON_KEY);

        let currentTab = 'politicians';
        let currentMode = 'latest';
        let currentFilterId = null;
        let currentTargetName = null;
        
        let page = 0;
        const PAGE_SIZE = 15;
        let isFetching = false;
        let hasMoreData = true;

        let cachePoliticians = [];
        let cacheIssues = [];
        let topFivePoliticians = [];
        const quickPolTags = ['游錫堃', '鄺麗貞', '傅崐萁', '陳玉珍', '徐欣瑩', '張嘉郡', '陳智菡', '黃瀞瑩', '顏寬恒', '佀廣洋'];

        const feedContainer = document.getElementById('events-feed');
        const loader = document.getElementById('loader');
        const endMessage = document.getElementById('end-message');
        const feedTitle = document.getElementById('feed-title');
        const searchContainer = document.getElementById('sidebar-search-container');
        const tagsContainer = document.getElementById('quick-tags-container');
        const mobileSelect = document.getElementById('mobile-issue-select');

        // 向下捲動隱藏 Header
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            const header = document.getElementById('main-header');
            if (currentScroll > lastScrollTop && currentScroll > 60) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }
            lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
        });

        // 頁面載入起點
        window.onload = async () => {
            // 寫入基礎 WebSite Schema
            injectBaseSchema();
            
            await fetchSidebarData();
            
            // 【SEO 優化】處理直接進入特定 URL 的情況 (例如使用者分享了 /?politician=123)
            const urlParams = new URLSearchParams(window.location.search);
            const polId = urlParams.get('politician');
            const issueId = urlParams.get('issue');

            renderSidebar();

            if (polId) {
                const pol = cachePoliticians.find(p => p.id === polId) || { name: '指定人物' };
                loadSpecificData('politician', polId, pol.name);
            } else if (issueId) {
                const issue = cacheIssues.find(i => i.id === issueId) || { name: '指定議題' };
                loadSpecificData('issue', issueId, issue.name);
            } else {
                loadLatestEvents();
            }
            
            setupIntersectionObserver();
        };

        // ==========================================
        // 2. SEO 動態更新與 Schema Markup
        // ==========================================
        
        // 更新網頁標題與描述
        function updateMeta(title, description) {
            document.title = `${title} | Polipoli 追蹤站`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if(metaDesc) {
                metaDesc.setAttribute("content", description);
            }
        }

        // 基礎 WebSite Schema
        function injectBaseSchema() {
            const schema = {
                "@context": "https://schema.org",
                "@type": "WebSite",
                "name": "Polipoli 啪哩啪哩追蹤站",
                "url": window.location.origin,
                "description": "政治人物言行紀錄與社會議題懶人包"
            };
            appendSchemaScript('schema-website', schema);
        }

        // 列表 ItemList Schema (對爬蟲友善)
        function injectFeedSchema(eventsData, pageTitle) {
            if (!eventsData || eventsData.length === 0) return;
            
            const itemList = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": pageTitle,
                "itemListElement": eventsData.map((e, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "item": {
                        "@type": "Event",
                        "name": e.quote ? e.quote.substring(0, 50) + "..." : "政治事件",
                        "startDate": e.date || new Date().toISOString(),
                        "url": window.location.href
                    }
                }))
            };
            appendSchemaScript('schema-itemlist', itemList);
        }

        function appendSchemaScript(id, schemaObj) {
            let script = document.getElementById(id);
            if (script) {
                script.text = JSON.stringify(schemaObj);
            } else {
                script = document.createElement('script');
                script.id = id;
                script.type = 'application/ld+json';
                script.text = JSON.stringify(schemaObj);
                document.head.appendChild(script);
            }
        }

        // 處理內部連結點擊，不重整頁面但更新 URL 與 Meta
        window.handleLinkClick = function(event, type, id, name) {
            event.preventDefault();
            const newUrl = `/?${type}=${id}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            loadSpecificData(type, id, name);
        };

        // ==========================================
        // 3. 資料抓取與渲染邏輯
        // ==========================================

        async function fetchSidebarData() {
            const [polRes, issueRes, mapRes] = await Promise.all([
                supabase.from('politicians').select('*').eq('is_visible', true).order('name'),
                supabase.from('issues').select('*').eq('is_visible', true).order('name'),
                supabase.from('event_politician_map').select('politician_id')
            ]);
            
            if (polRes.data) cachePoliticians = polRes.data;
            if (issueRes.data) cacheIssues = issueRes.data;
            
            if (mapRes.data && cachePoliticians.length > 0) {
                const counts = mapRes.data.reduce((acc, cur) => {
                    acc[cur.politician_id] = (acc[cur.politician_id] || 0) + 1;
                    return acc;
                }, {});
                const topFiveIds = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 5);
                topFivePoliticians = cachePoliticians.filter(p => topFiveIds.includes(p.id));
            }
        }

        window.switchMainTab = function(tabName, preventReload = false) {
            if (currentTab === tabName) return;
            currentTab = tabName;
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if (!preventReload) {
                resetToLatest();
            } else {
                renderSidebar();
            }
        };

        function renderSidebar() {
            const title = document.getElementById('sidebar-title');
            const searchInput = document.getElementById('sidebar-search');
            
            if (currentTab === 'politicians') {
                title.textContent = '人物檔案庫';
                searchContainer.style.display = 'block';
                mobileSelect.classList.remove('active-tab');
                tagsContainer.classList.remove('desktop-issue-tags');
                if (searchInput.value.trim() !== '') {
                    filterSidebar();
                } else {
                    renderSidebarButtons();
                }
            } else {
                title.textContent = '社會議題庫';
                searchContainer.style.display = 'none';
                mobileSelect.classList.add('active-tab');
                tagsContainer.classList.add('desktop-issue-tags');
                renderSidebarButtons();
                renderMobileIssueSelect();
            }
        }

        window.renderMobileIssueSelect = function() {
            let options = `<option value="latest" ${currentMode === 'latest' ? 'selected' : ''}>✨ 全部 / 所有事件</option>`;
            cacheIssues.forEach(i => {
                options += `<option value="${i.id}" ${currentFilterId === i.id ? 'selected' : ''}>📌 ${i.name}</option>`;
            });
            mobileSelect.innerHTML = options;
        };

        window.handleMobileIssueSelect = function(val) {
            if (val === 'latest') {
                window.history.pushState({},'','/');
                resetToLatest();
            } else {
                const issue = cacheIssues.find(i => i.id === val);
                if (issue) {
                    const newUrl = `/?issue=${issue.id}`;
                    window.history.pushState({}, '', newUrl);
                    loadSpecificData('issue', issue.id, issue.name);
                }
            }
        };

        function renderSidebarButtons() {
            const isLatestActive = currentMode === 'latest' ? 'active' : '';
            let html = '';
            
            if (currentTab === 'politicians') {
                html += `<a href="/" class="quick-tag-btn ${isLatestActive}" style="width: 100%; margin-bottom: 5px; justify-content: center;" onclick="event.preventDefault(); window.history.pushState({},'','/'); resetToLatest()">✨ 綜合最新事件</a>`;
                
                if (topFivePoliticians.length > 0) {
                    html += `<div class="section-label">🔥 熱門追蹤人物</div>`;
                    html += topFivePoliticians.map(p => {
                        const isActive = currentFilterId === p.id ? 'active' : '';
                        return `<a href="/?politician=${p.id}" class="quick-tag-btn ${isActive}" onclick="handleLinkClick(event, 'politician', '${p.id}', '${p.name}')">👤 ${p.name}</a>`;
                    }).join('');
                }
                
                const visibleQuickTags = quickPolTags.filter(tag => cachePoliticians.some(p => p.name === tag));
                const filteredQuickTags = visibleQuickTags.filter(tag => !topFivePoliticians.some(tp => tp.name === tag));
                
                if (filteredQuickTags.length > 0) {
                    html += `<div class="section-label">📌 難檢字快速查</div>`;
                    html += filteredQuickTags.map(tag => {
                        const p = cachePoliticians.find(pol => pol.name === tag);
                        const isActive = currentFilterId === p.id ? 'active' : '';
                        return `<a href="/?politician=${p.id}" class="quick-tag-btn ${isActive}" onclick="handleLinkClick(event, 'politician', '${p.id}', '${p.name}')">👤 ${p.name}</a>`;
                    }).join('');
                }
            } else {
                html += `<a href="/" class="quick-tag-btn ${isLatestActive}" style="width: 100%; margin-bottom: 5px; justify-content: center;" onclick="event.preventDefault(); window.history.pushState({},'','/'); resetToLatest()">✨ 全部 / 所有事件</a>`;
                if (cacheIssues.length > 0) {
                    html += cacheIssues.map(i => {
                        const isActive = currentFilterId === i.id ? 'active' : '';
                        return `<a href="/?issue=${i.id}" class="quick-tag-btn ${isActive}" onclick="handleLinkClick(event, 'issue', '${i.id}', '${i.name}')">📌 ${i.name}</a>`;
                    }).join('');
                }
            }
            tagsContainer.innerHTML = html;
        }

        window.filterSidebar = function() {
            const rawTerm = document.getElementById('sidebar-search').value.trim();
            const term = rawTerm.toLowerCase();
            
            if (!term) { renderSidebarButtons(); return; }
            
            if (currentTab === 'politicians') {
                const filtered = cachePoliticians.filter(p => p.name.toLowerCase().includes(term));
                if (filtered.length === 0) {
                    tagsContainer.innerHTML = `<span class="quick-tag-btn active">👤 ${rawTerm} (查無此人)</span>`;
                } else {
                    tagsContainer.innerHTML = filtered.map(p => {
                        const isActive = currentFilterId === p.id ? 'active' : '';
                        return `<a href="/?politician=${p.id}" class="quick-tag-btn ${isActive}" onclick="handleLinkClick(event, 'politician', '${p.id}', '${p.name}')">👤 ${p.name}</a>`;
                    }).join('');
                }
            }
        };

        async function loadLatestEvents() {
            if (isFetching || !hasMoreData) return;
            isFetching = true;
            loader.classList.add('visible');
            
            updateMeta("最新綜合事件", "追蹤台灣政治人物最新言行與社會議題，每日更新。");
            
            const start = page * PAGE_SIZE;
            const end = start + PAGE_SIZE - 1;
            
            const { data, error } = await supabase
                .from('events')
                .select(`*, event_politician_map ( politician_id, politicians ( name ) ), event_issue_map ( issue_id, issues ( name ) )`)
                .eq('is_visible', true)
                .order('date', { ascending: false })
                .range(start, end);
                
            handleDataResponse(data, error, "最新綜合事件");
        }

        window.loadSpecificData = async function(type, id, name) {
            currentMode = 'specific';
            currentFilterId = id;
            currentTargetName = (type === 'politician') ? name : null;
            
            // 更新 Meta 讓爬蟲知道這頁變了
            const desc = type === 'politician' ? `查看 ${name} 的歷史言行紀錄與爭議事件整理。` : `深入了解 ${name} 相關的政治言論與社會影響。`;
            updateMeta(`${name} 相關紀錄`, desc);

            if (type === 'politician' && currentTab !== 'politicians') {
                switchMainTab('politicians', true);
                document.getElementById('sidebar-search').value = name;
            } else if (type === 'issue' && currentTab !== 'issues') {
                switchMainTab('issues', true);
            }
            
            const pageTitle = `${name} 相關事件`;
            feedTitle.textContent = pageTitle;
            page = 0;
            hasMoreData = true;
            feedContainer.innerHTML = '';
            loader.classList.add('visible');
            endMessage.style.display = 'none';
            
            let queryResult;
            if (type === 'politician') {
                queryResult = await supabase.from('event_politician_map').select(`
                    events!inner ( *, event_politician_map ( politician_id, politicians ( name ) ), event_issue_map ( issue_id, issues ( name ) ) )
                `).eq('politician_id', id).eq('events.is_visible', true);
            } else {
                queryResult = await supabase.from('event_issue_map').select(`
                    events!inner ( *, event_politician_map ( politician_id, politicians ( name ) ), event_issue_map ( issue_id, issues ( name ) ) )
                `).eq('issue_id', id).eq('events.is_visible', true);
            }
            
            if (queryResult.error) {
                console.error('特定資料載入失敗:', queryResult.error);
                loader.classList.remove('visible');
                return;
            }
            
            const eventsData = queryResult.data.map(item => item.events).sort((a, b) => new Date(b.date || '1970-01-01') - new Date(a.date || '1970-01-01'));
            
            renderEvents(eventsData, pageTitle);
            hasMoreData = false;
            loader.classList.remove('visible');
            endMessage.style.display = 'block';
        };

        function handleDataResponse(data, error, pageTitle) {
            if (error) {
                console.error('事件載入失敗:', error);
                isFetching = false;
                loader.classList.remove('visible');
                return;
            }
            if (data.length < PAGE_SIZE) {
                hasMoreData = false;
                endMessage.style.display = 'block';
            }
            renderEvents(data, pageTitle);
            page++;
            isFetching = false;
            loader.classList.remove('visible');
        }

        function renderEvents(events, pageTitle) {
            if (events && events.length > 0) {
                injectFeedSchema(events, pageTitle);
            }

            const html = events.map(e => {
                const issueTags = e.event_issue_map?.filter(m => m.issues?.name).map(m => 
                    `<a href="/?issue=${m.issue_id}" class="info-tag issue-tag" onclick="handleLinkClick(event, 'issue', '${m.issue_id}', '${m.issues.name}')">📌 ${m.issues.name}</a>`
                ).join('') || '';

                const polTags = e.event_politician_map?.filter(m => m.politicians?.name && m.politicians.name !== currentTargetName).map(m => 
                    `<a href="/?politician=${m.politician_id}" class="info-tag" onclick="handleLinkClick(event, 'politician', '${m.politician_id}', '${m.politicians.name}')">👤 ${m.politicians.name}</a>`
                ).join('') || ''; 

                const altText = e.quote ? `${e.quote.substring(0, 20)}... 的相關圖片` : '政治事件紀錄圖片';
                
                // 【SEO & 效能】加入 loading="lazy" 與 alt
                const imageHtml = e.image_url ? `
                    <div class="event-img-container" onclick="openImageModal('${e.image_url}')">
                        <img src="${e.image_url}" class="event-img" alt="${altText}" loading="lazy" />
                    </div>
                ` : '';

                return `
                    <div class="event-card">
                        <div class="tag-row">${issueTags} ${polTags}</div>
                        <p class="event-quote">${e.quote || '暫無引言'}</p>
                        ${imageHtml}
                        <div class="event-actions">
                           ${e.source_url ? `<a href="${e.source_url}" target="_blank" rel="noopener noreferrer" class="source-link">🔗 查看來源</a>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            feedContainer.insertAdjacentHTML('beforeend', html);
        }

        window.resetToLatest = function() {
            // 【邏輯卡死防呆修復】如果 page 為 0 但其實是點擊了強制刷新，就不要 return
            if (currentMode === 'latest' && page === 0 && !isFetching) return; 
            
            window.history.pushState({},'','/');
            currentMode = 'latest';
            currentFilterId = null;
            currentTargetName = null;
            page = 0;
            hasMoreData = true;
            document.getElementById('sidebar-search').value = '';
            feedContainer.innerHTML = '';
            feedTitle.textContent = currentTab === 'issues' ? '全部社會議題事件' : '綜合最新事件牆';
            endMessage.style.display = 'none';
            renderSidebar();
            loadLatestEvents();
        };

        function setupIntersectionObserver() {
            const options = { root: null, rootMargin: '100px', threshold: 0.1 }; // 提早 100px 載入，體驗更好
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && currentMode === 'latest' && hasMoreData && !isFetching) {
                    loadLatestEvents();
                }
            }, options);
            observer.observe(loader);
        }

        window.openImageModal = function(url) {
            const modal = document.getElementById('image-modal');
            document.getElementById('modal-img').src = url;
            modal.classList.add('active');
        };

        window.closeImageModal = function() {
            document.getElementById('image-modal').classList.remove('active');
            setTimeout(() => document.getElementById('modal-img').src = '', 300);
        };
    </script>
</body>
</html>
