<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polipoli 啪哩啪哩 | 後台最高管理決策中心</title>
<link rel="stylesheet" href="./admin.css">
</head>
<body>
<div id="unlock-screen">
<div class="unlock-box">
<h2>Polipoli 最高決策中心</h2>
<div class="form-group">
<label for="db-url">Supabase API 網址 (URL)</label>
<input type="text" id="db-url" class="form-input" placeholder="https://your-project.supabase.co">
</div>
<div class="form-group">
<label for="db-key">最高權限私鑰 (service_role secret)</label>
<input type="password" id="db-key" class="form-input" placeholder="請貼上 service_role key 憑證">
</div>
<button class="btn" style="width: 100%; justify-content: center;" onclick="attemptUnlock()">🔓 驗證金鑰並解鎖系統</button>
</div>
</div>
<div id="admin-panel">
<header>
<div class="header-title">
<h1>啪哩啪哩最高決策中心</h1>
</div>
<button class="btn btn-danger" onclick="lockAndLogOut()">🔒 登出</button>
</header>
<nav class="admin-nav" aria-label="後台選單">
<div class="nav-tab active" id="tab-btn-settings" onclick="switchAdminTab('settings')">🧱 匯入與設定</div>
<div class="nav-tab" id="tab-btn-review" onclick="switchAdminTab('review')">⚖️ 審核牆</div>
<div class="nav-tab" id="tab-btn-analysis" onclick="switchAdminTab('analysis')">🔍 分析與紀錄</div>
</nav>
<div class="tab-content active" id="tab-content-settings">
<div class="admin-card">
<h3>📦 爭議事件匯入</h3>
<div class="form-group">
<label for="json-paste-area">請將 Gemini 產出的 JSON 陣列代碼複製並貼上：</label>
<textarea id="json-paste-area" class="form-input"></textarea>
</div>
<button class="btn btn-success" id="btn-execute-import" onclick="importPastedJSON()">🚀 執行強效大數據匯入</button>
</div>
<div class="admin-card">
<h3>🩹 既有事件回填（對人民 / 對國安影響）</h3>
<div class="form-group">
<label for="backfill-json-paste-area">請將 Gemini 依「回填 prompt」產出的 JSON 陣列（含 id）複製並貼上，只會更新對應 id 的影響欄位，不影響其他資料：</label>
<textarea id="backfill-json-paste-area" class="form-input"></textarea>
</div>
<button class="btn btn-success" id="btn-execute-backfill" onclick="backfillImpactFields()">🩹 執行回填更新</button>
</div>
<div class="grid-2">
<div class="admin-card">
<h3>👤 追蹤政治人物管理</h3>
<div style="display: flex; gap: 8px; margin-bottom: 1.5rem;">
<input type="text" id="new-pol-name" class="form-input" placeholder="姓名，如：黃國昌" style="flex: 2;">
<input type="text" id="new-pol-party" class="form-input" placeholder="政黨，如：民眾黨" style="flex: 1;">
<button class="btn" onclick="addPolitician()">新增人物</button>
</div>
<div class="sidebar-list" style="max-height: 250px; overflow-y: auto;" id="list-politicians"></div>
</div>
<div class="admin-card">
<h3>📌 核心公共議題管理</h3>
<div style="display: flex; gap: 8px; margin-bottom: 1.5rem;">
<input type="text" id="new-issue-name" class="form-input" placeholder="議題名稱，2至4字，如：居住正義" style="flex: 1;">
<button class="btn" onclick="addIssue()">新增議題</button>
</div>
<div class="sidebar-list" style="max-height: 250px; overflow-y: auto;" id="list-issues"></div>
</div>
</div>
</div>
<div class="tab-content" id="tab-content-review">
    <div class="filter-bar">
        <button class="filter-btn active" id="filter-btn-pending" onclick="setEventFilter('pending')">🔴 待審核</button>
        <button class="filter-btn" id="filter-btn-staged" onclick="setEventFilter('staged')">🟡 暫存區</button>
        <button class="filter-btn" id="filter-btn-approved" onclick="setEventFilter('approved')">🟢 已核准</button>
    </div>

    <div class="action-bar-bottom">
        <button class="btn btn-danger" onclick="deleteAllPending()">🗑️ 一鍵清空清單</button>
        <button class="btn btn-success" onclick="publishAllPending()">🚀 一鍵分批上架</button>
    </div>

    <div class="review-list" id="review-list-container">
        <div style="text-align: center; color: var(--text-muted); padding: 2rem;">資料在庫檢索中...</div>
    </div>
</div>

<div class="tab-content" id="tab-content-analysis">
    <div class="admin-card">
        <h3>👤 人物風格分析</h3>
        <div class="form-group">
            <label for="analysis-politician-select">選擇政治人物</label>
            <select id="analysis-politician-select" class="form-input" onchange="loadPoliticianAnalysisIntoForm()"></select>
        </div>
        <div class="form-group">
            <label for="analysis-politician-content">分析內容（這是解讀，非事實認定，請避免斷言式指控）</label>
            <textarea id="analysis-politician-content" class="form-input" style="min-height: 160px;"></textarea>
        </div>
        <button class="btn btn-success" onclick="savePoliticianAnalysis()">💾 儲存人物分析</button>
        <button class="btn btn-danger" onclick="deletePoliticianAnalysis()">🗑️ 刪除此人物的分析</button>
        <div class="sidebar-list" style="max-height: 250px; overflow-y: auto; margin-top: 1.5rem;" id="list-politician-analysis"></div>
    </div>

    <div class="admin-card">
        <h3>📌 事件解讀</h3>
        <div class="form-group">
            <label for="analysis-event-select">選擇事件（依引言搜尋）</label>
            <input type="text" id="analysis-event-search" class="form-input" placeholder="輸入事件引言關鍵字搜尋..." oninput="filterEventAnalysisSelect()">
            <select id="analysis-event-select" class="form-input" onchange="loadEventAnalysisIntoForm()" style="margin-top: 8px;"></select>
        </div>
        <div class="form-group">
            <label for="analysis-event-content">解讀內容（這是解讀，非事實認定，請避免斷言式指控）</label>
            <textarea id="analysis-event-content" class="form-input" style="min-height: 160px;"></textarea>
        </div>
        <button class="btn btn-success" onclick="saveEventAnalysis()">💾 儲存事件解讀</button>
        <button class="btn btn-danger" onclick="deleteEventAnalysis()">🗑️ 刪除此事件的解讀</button>
        <div class="sidebar-list" style="max-height: 250px; overflow-y: auto; margin-top: 1.5rem;" id="list-event-analysis"></div>
    </div>
</div>

<div class="modal" id="edit-modal">
<div class="modal-content">
<div class="modal-header">
<h4>🛠️ 爭議事件細節全方位校正</h4>
<button class="btn btn-danger" style="padding: 4px 10px;" onclick="closeEditModal()">✕</button>
</div>
<input type="hidden" id="edit-event-id">
<div class="form-group">
<label for="edit-quote">最核心引言 / 爭議標題 (20字以內)</label>
<input type="text" id="edit-quote" class="form-input">
</div>
<div class="form-group">
<label for="edit-date">發生日期</label>
<input type="date" id="edit-date" class="form-input">
</div>
<div class="form-group">
<label>👤 關聯政治人物設定 (可多選，綁定中介表，絕不漏網)</label>
<div class="checkbox-group-box" id="edit-politicians-checkboxes"></div>
</div>
<div class="form-group">
<label>📌 關聯社會議題設定 (單選映射表)</label>
<select id="edit-issue-select" class="form-input"></select>
</div>
<div class="form-group">
<label for="edit-context">事件脈絡敘事說歷史 (100字至200字)</label>
<textarea id="edit-context" class="form-input"></textarea>
</div>
<div class="form-group">
<label for="edit-people-impact">💥 對人民的影響</label>
<textarea id="edit-people-impact" class="form-input" placeholder="這件事實際上如何影響一般民眾的生活、荷包、權益等"></textarea>
</div>
<div class="form-group">
<label for="edit-people-impact-score">📊 對人民影響程度 (0 - 100)</label>
<input type="number" id="edit-people-impact-score" class="form-input" min="0" max="100" step="1" placeholder="0 到 100 的整數，留空代表未評分">
</div>
<div class="form-group">
<label for="edit-national-security-impact">🛡️ 對國安的影響</label>
<textarea id="edit-national-security-impact" class="form-input" placeholder="這件事對國家安全、主權、國防、關鍵基礎設施等造成的影響"></textarea>
</div>
<div class="form-group">
<label for="edit-national-impact-score">📊 對國家影響程度 (0 - 100)</label>
<input type="number" id="edit-national-impact-score" class="form-input" min="0" max="100" step="1" placeholder="0 到 100 的整數，留空代表未評分">
</div>
<div class="form-group">
<label for="edit-source-url">可靠佐證新聞 URL</label>
<input type="url" id="edit-source-url" class="form-input" placeholder="https://...">
</div>
<div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 2rem;">
<button class="btn btn-secondary" onclick="closeEditModal()">取消放棄</button>
<button class="btn btn-success" onclick="saveEventEdits()">💾 確認無誤，儲存變更</button>
</div>
</div>
</div>
<script type="module" src="./admin.js"></script>
</body>
</html>
